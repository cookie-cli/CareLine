name: Backend Gate

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-gate.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-gate.yml"

jobs:
  backend-gate:
    runs-on: ubuntu-latest
    env:
      ALLOW_MISSING_FIREBASE: "1"
      AUTH_REQUIRED: "true"
      API_TEST_BASE_URL: "http://127.0.0.1:8000"
      FIREBASE_KEY_PATH: "backend/.secrets/firebase-key.json"
      ALLOWED_ORIGINS: "http://localhost:3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile and readiness checks
        run: sh backend/tests/scripts/final_readiness_check.sh

      - name: Export OpenAPI contract snapshot
        run: |
          cd backend
          python tests/scripts/export_openapi_contract.py

      - name: Start backend
        run: |
          cd backend
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 >/tmp/backend.log 2>&1 &
          sleep 4
          curl -fsS http://127.0.0.1:8000/health

      - name: Unauthenticated smoke checks
        run: python backend/tests/scripts/api_security_bot.py --mode unauth --tags smoke
